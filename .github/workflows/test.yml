name: Tests
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:

permissions: read-all

jobs:
  indentation:
    name: Indentation check
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install fish shell
        uses: fish-shop/install-fish-shell@17c2b2fbcd85a9c9b38df604844590910b164b6b # v2.1.17
      - name: Check indentation
        uses: fish-shop/indent-check@11f86650806990311d0654c75038f12d83219770 # v2.2.108
  syntax:
    name: Syntax check
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install fish shell
        uses: fish-shop/install-fish-shell@17c2b2fbcd85a9c9b38df604844590910b164b6b # v2.1.17
      - name: Syntax check fish files
        uses: fish-shop/syntax-check@b7450a98402bf58615afcc6b36805a801182f22d # v2.2.106
  tests:
    name: Unit tests
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Fetch repository history for access to tags in tests
        run: git fetch --prune --unshallow --tags --force
      - name: Install fish shell
        uses: fish-shop/install-fish-shell@17c2b2fbcd85a9c9b38df604844590910b164b6b # v2.1.17
      - name: Install pond
        uses: fish-shop/install-plugin@70c0ea4dd8bef7b6c0c18c82c2ed528b23f0a52f # v2.3.110
        with:
          plugin-manager: fisher
          plugins: ${{ github.workspace }}
      - name: Run Fishtape tests
        uses: fish-shop/run-fishtape-tests@c3ebfac40746a042e2f82064e4d047c6a3ee6b37 # v2.3.110
        with:
          patterns: tests/**.fish
  install:
    name: Install tests
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        plugin-manager: [fisher, oh-my-fish]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install fish shell
        uses: fish-shop/install-fish-shell@17c2b2fbcd85a9c9b38df604844590910b164b6b # v2.1.17
      - name: Install pond using ${{ matrix.plugin-manager }}
        uses: fish-shop/install-plugin@70c0ea4dd8bef7b6c0c18c82c2ed528b23f0a52f # v2.3.110
        with:
          plugin-manager: ${{ matrix.plugin-manager }}
          plugins: ${{ github.workspace }}
      - name: Check pond is installed
        run: functions -q pond
        shell: fish {0}
