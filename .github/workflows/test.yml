name: Tests
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:

permissions: read-all

jobs:
  indentation:
    name: Indentation check
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install fish shell
        uses: fish-shop/install-fish-shell@89e347cfcba1988bb25cea42dcbe0ca1b8379c7a # v2.1.20
      - name: Check indentation
        uses: fish-shop/indent-check@0c130a0c8909cef7af9ba0458d5beef98857278e # v2.2.111
  syntax:
    name: Syntax check
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install fish shell
        uses: fish-shop/install-fish-shell@89e347cfcba1988bb25cea42dcbe0ca1b8379c7a # v2.1.20
      - name: Syntax check fish files
        uses: fish-shop/syntax-check@5663baa85cfbec0d1a3c7014e46c5054f57e9f57 # v2.2.109
  tests:
    name: Unit tests
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Fetch repository history for access to tags in tests
        run: git fetch --prune --unshallow --tags --force
      - name: Install fish shell
        uses: fish-shop/install-fish-shell@89e347cfcba1988bb25cea42dcbe0ca1b8379c7a # v2.1.20
      - name: Install pond
        uses: fish-shop/install-plugin@2b08875e3b9c45d0297e41d8e8879e4dd9a68753 # v2.3.113
        with:
          plugin-manager: fisher
          plugins: ${{ github.workspace }}
      - name: Run Fishtape tests
        uses: fish-shop/run-fishtape-tests@bdfbc9d7833cababdb11d36e93549b6dd33e4ca4 # v2.3.113
        with:
          patterns: tests/**.fish
  install:
    name: Install tests
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        plugin-manager: [fisher, oh-my-fish]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install fish shell
        uses: fish-shop/install-fish-shell@89e347cfcba1988bb25cea42dcbe0ca1b8379c7a # v2.1.20
      - name: Install pond using ${{ matrix.plugin-manager }}
        uses: fish-shop/install-plugin@2b08875e3b9c45d0297e41d8e8879e4dd9a68753 # v2.3.113
        with:
          plugin-manager: ${{ matrix.plugin-manager }}
          plugins: ${{ github.workspace }}
      - name: Check pond is installed
        run: functions -q pond
        shell: fish {0}
