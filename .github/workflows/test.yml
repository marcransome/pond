name: Tests
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:

permissions: read-all

jobs:
  indentation:
    name: Indentation check
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install fish shell
        uses: fish-shop/install-fish-shell@97fc21600a678ad8c35136316d344fbc22d52b50 # v2.1.18
      - name: Check indentation
        uses: fish-shop/indent-check@c6338e4ff9391c73e00a99888491e006880e1554 # v2.2.109
  syntax:
    name: Syntax check
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install fish shell
        uses: fish-shop/install-fish-shell@97fc21600a678ad8c35136316d344fbc22d52b50 # v2.1.18
      - name: Syntax check fish files
        uses: fish-shop/syntax-check@94b38995daa6b96259ff2411f5257d89e65dd9ac # v2.2.107
  tests:
    name: Unit tests
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Fetch repository history for access to tags in tests
        run: git fetch --prune --unshallow --tags --force
      - name: Install fish shell
        uses: fish-shop/install-fish-shell@97fc21600a678ad8c35136316d344fbc22d52b50 # v2.1.18
      - name: Install pond
        uses: fish-shop/install-plugin@508d7dbccdd50a08d9cc500fa1f438984bd047a2 # v2.3.111
        with:
          plugin-manager: fisher
          plugins: ${{ github.workspace }}
      - name: Run Fishtape tests
        uses: fish-shop/run-fishtape-tests@4f88d2d85e7178ad6f01d9d01f693b8859ada52c # v2.3.111
        with:
          patterns: tests/**.fish
  install:
    name: Install tests
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        plugin-manager: [fisher, oh-my-fish]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install fish shell
        uses: fish-shop/install-fish-shell@97fc21600a678ad8c35136316d344fbc22d52b50 # v2.1.18
      - name: Install pond using ${{ matrix.plugin-manager }}
        uses: fish-shop/install-plugin@508d7dbccdd50a08d9cc500fa1f438984bd047a2 # v2.3.111
        with:
          plugin-manager: ${{ matrix.plugin-manager }}
          plugins: ${{ github.workspace }}
      - name: Check pond is installed
        run: functions -q pond
        shell: fish {0}
